<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Gastos da Casa</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"Controle Financeiro Familiar","short_name":"Finanças Casa","start_url":".","display":"standalone","background_color":"#F3F4F6","theme_color":"#4F46E5","icons":[{"src":"data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220%22 width=%22192%22 height=%22192%22><rect width=%22100%%22 height=%22100%%22 fill=%22%234F46E5%22/><text x=%2250%%22 y=%2255%%22 font-family=%22sans-serif%22 font-size=%2290%22 fill=%22white%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22>🏠</text></svg>","sizes":"192x192","type":"image/svg+xml"}]}'></link>

    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --danger: #F43F5E;
            --success: #10B981;
            --warning: #F59E0B;
            --pietro: #4F46E5;
            --patrick: #8B5CF6;
            --border: #E5E7EB;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 1.5rem; }
        .container { max-width: 1200px; margin: 0 auto; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 1rem 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .top-bar h1 { font-size: 1.5rem; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }
        .controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .card { background-color: var(--card-bg); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.04); text-align: center; border: 1px solid var(--border); transition: transform 0.2s; }
        .card h3 { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .card .value { font-size: 2rem; font-weight: bold; }
        .value.total { color: var(--text-main); }
        .value.pendente { color: var(--warning); }
        
        .acerto-status { font-size: 1.1rem; font-weight: bold; margin-bottom: 12px; color: var(--text-main); }
        
        .main-grid { display: grid; grid-template-columns: 380px 1fr; gap: 2rem; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

        .panel { background-color: var(--card-bg); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.04); margin-bottom: 1.5rem; border: 1px solid var(--border); }
        .panel h2 { font-size: 1.1rem; margin-bottom: 1.2rem; color: var(--text-main); display: flex; align-items: center; gap: 0.5rem; border-bottom: 2px solid var(--bg-color); padding-bottom: 0.5rem; }
        
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 500; font-size: 0.85rem; color: var(--text-main); }
        input, select { width: 100%; padding: 0.65rem; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 0.95rem; background: #FFF; color: var(--text-main); transition: border 0.2s; }
        input:focus, select:focus { border-color: var(--primary); outline: none; }
        
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.65rem 1rem; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .btn-primary { background-color: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-sec { background-color: var(--bg-color); color: var(--text-main); }
        .btn-sec:hover { background: #E5E7EB; }
        .btn-success { background-color: var(--success); color: white; width: 100%; }
        .btn-success:hover { opacity: 0.9; }
        
        .category-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        .cat-tag { background: var(--bg-color); padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.8rem; display: flex; align-items: center; gap: 0.4rem; font-weight: 500; }
        .cat-tag i { cursor: pointer; color: var(--danger); }

        .table-box { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th, td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); }
        th { background-color: #F9FAFB; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; }
        tr:hover { background-color: #F9FAFB; }
        
        .badge { padding: 0.25rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: bold; display: inline-block; }
        .badge.pendente { background-color: #FEF3C7; color: #D97706; }
        .badge.pago-pietro { background-color: #E0E7FF; color: var(--pietro); }
        .badge.pago-patrick { background-color: #F3E8FF; color: var(--patrick); }
        .badge.transfer { background-color: #D1FAE5; color: #059669; }

        .row-actions { display: flex; gap: 0.4rem; }
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 0.25rem; border-radius: 4px; transition: background 0.2s; }
        .btn-icon.edit { color: var(--primary); }
        .btn-icon.delete { color: var(--danger); }
        .btn-icon:hover { background: var(--bg-color); }
        
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; font-size: 1.5rem; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div id="loading-overlay"><i class="fa-solid fa-spinner fa-spin"></i>&nbsp; Sincronizando com a nuvem...</div>

<div class="container">
    <div class="top-bar">
        <h1><i class="fa-solid fa-house-chimney-user"></i> Finanças da Casa</h1>
        <div class="controls">
            <label for="filtro-mes" style="margin: 0; font-weight: bold;">Ciclo:</label>
            <input type="month" id="filtro-mes" style="width: 160px; padding: 0.5rem;" onchange="window.updateSystem()">
            <button class="btn btn-sec" onclick="window.exportToCSV()"><i class="fa-solid fa-file-csv"></i> Exportar Mês</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="card">
            <h3>Total Pago no Ciclo</h3>
            <div class="value total" id="val-total">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Contas em Aberto</h3>
            <div class="value pendente" id="val-pendente">R$ 0,00</div>
        </div>
        <div class="card" style="grid-column: span 2;">
            <h3>Acerto de Contas (Divisão 50/50)</h3>
            <div class="acerto-status" id="val-acerto">Zeradinho!</div>
            <div id="acerto-action-container"></div>
        </div>
    </div>

    <div class="main-grid">
        <div>
            <div class="panel">
                <h2 id="form-title"><i class="fa-solid fa-circle-plus"></i> Lançar Despesa</h2>
                <form id="expense-form">
                    <input type="hidden" id="edit-id">
                    <div class="form-group">
                        <label for="descricao">Descrição do Gasto</label>
                        <input type="text" id="descricao" required autocomplete="off" placeholder="Ex: Feira Central, Luz">
                    </div>
                    <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                        <div class="form-group">
                            <label for="valor">Valor (R$)</label>
                            <input type="number" id="valor" step="0.01" required placeholder="0,00">
                        </div>
                        <div class="form-group">
                            <label for="data-gasto">Data</label>
                            <input type="date" id="data-gasto" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="categoria">Categoria</label>
                        <select id="categoria" required></select>
                    </div>
                    <button type="submit" class="btn btn-primary" id="btn-submit">Registrar Despesa</button>
                    <button type="button" class="btn btn-sec" id="btn-cancel-edit" style="display: none; width: 100%; margin-top: 0.5rem;" onclick="window.clearForm()">Cancelar Edição</button>
                </form>
            </div>

            <div class="panel">
                <h2><i class="fa-solid fa-tags"></i> Categorias da Casa</h2>
                <div class="form-group" style="display: flex; gap: 0.5rem;">
                    <input type="text" id="nova-categoria" placeholder="Nova Categoria...">
                    <button class="btn btn-sec" onclick="window.adicionarCategoria()"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div class="category-tags" id="category-tags-container"></div>
            </div>

            <div class="panel">
                <h2><i class="fa-solid fa-chart-pie"></i> Distribuição Mensal</h2>
                <canvas id="categoryChart" style="max-height: 250px;"></canvas>
            </div>
        </div>

        <div>
            <div class="panel" style="min-height: 600px;">
                <h2><i class="fa-solid fa-list-check"></i> Extrato do Ciclo Selecionado</h2>
                <div class="table-box">
                    <table>
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Descrição / Categoria</th>
                                <th>Valor</th>
                                <th>Status</th>
                                <th style="text-align: right;">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="expense-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // Suas chaves exatas do Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCnTQShWRJWO34XJ7nzuX8F6Tt0LeRzq2Y",
      authDomain: "financas-casa-57d58.firebaseapp.com",
      projectId: "financas-casa-57d58",
      storageBucket: "financas-casa-57d58.firebasestorage.app",
      messagingSenderId: "644944268579",
      appId: "1:644944268579:web:58e4c4d4d50e0a85fc1096"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Variáveis Globais
    let transactions = [];
    let categories = JSON.parse(localStorage.getItem('casa_categories')) || ['Mercado', 'Contas Fixas', 'Aluguel/Condomínio', 'Lazer/Delivery', 'Manutenção'];
    let chartInstance = null;

    // Inicialização da UI
    const hoje = new Date();
    const anoMesAtual = hoje.toISOString().substring(0, 7);
    document.getElementById('filtro-mes').value = anoMesAtual;
    document.getElementById('data-gasto').value = hoje.toISOString().substring(0, 10);

    const formatCurrency = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    // Escuta o Banco de Dados em Tempo Real
    onSnapshot(collection(db, "transacoes"), (snapshot) => {
        transactions = [];
        snapshot.forEach((doc) => {
            transactions.push({ id: doc.id, ...doc.data() });
        });
        
        // Ordena por data (mais recente primeiro)
        transactions.sort((a, b) => new Date(b.data) - new Date(a.data));
        
        document.getElementById('loading-overlay').style.display = 'none';
        window.updateSystem();
    });

    window.renderCategoryUI = () => {
        const select = document.getElementById('categoria');
        const container = document.getElementById('category-tags-container');
        select.innerHTML = ''; container.innerHTML = '';

        categories.forEach(cat => {
            select.innerHTML += `<option value="${cat}">${cat}</option>`;
            container.innerHTML += `<span class="cat-tag">${cat} <i class="fa-solid fa-xmark" onclick="window.removerCategoria('${cat}')"></i></span>`;
        });
    };

    window.adicionarCategoria = () => {
        const input = document.getElementById('nova-categoria');
        const nome = input.value.trim();
        if (nome && !categories.includes(nome)) {
            categories.push(nome);
            localStorage.setItem('casa_categories', JSON.stringify(categories));
            input.value = '';
            window.updateSystem();
        }
    };

    window.removerCategoria = (cat) => {
        categories = categories.filter(c => c !== cat);
        localStorage.setItem('casa_categories', JSON.stringify(categories));
        window.updateSystem();
    };

    window.updateSystem = () => {
        const mesSelecionado = document.getElementById('filtro-mes').value;
        let totalPago = 0, totalPendente = 0, pietroBolso = 0, patrickBolso = 0;
        let chartData = {};

        const transacoesDoMes = transactions.filter(t => t.data.substring(0, 7) === mesSelecionado);

        transacoesDoMes.forEach(t => {
            const val = parseFloat(t.valor);
            if (t.type === 'expense') {
                if (t.status === 'pendente') {
                    totalPendente += val;
                } else {
                    totalPago += val;
                    chartData[t.categoria] = (chartData[t.categoria] || 0) + val;
                    if (t.pagador === 'Pietro') pietroBolso += val;
                    if (t.pagador === 'Patrick') patrickBolso += val;
                }
            } else if (t.type === 'transfer') {
                if (t.origem === 'Pietro') { pietroBolso += val; patrickBolso -= val; }
                if (t.origem === 'Patrick') { patrickBolso += val; pietroBolso -= val; }
            }
        });

        const cotaIdeal = totalPago / 2;
        const pietroSaldo = pietroBolso - cotaIdeal;
        const patrickSaldo = patrickBolso - cotaIdeal;

        document.getElementById('val-total').innerText = formatCurrency(totalPago);
        document.getElementById('val-pendente').innerText = formatCurrency(totalPendente);

        const statusLabel = document.getElementById('val-acerto');
        const actionContainer = document.getElementById('acerto-action-container');
        actionContainer.innerHTML = '';

        if (totalPago === 0 || Math.abs(pietroSaldo) < 0.01) {
            statusLabel.innerText = "Tudo quitado neste ciclo!";
            statusLabel.style.color = "var(--success)";
        } else if (pietroSaldo < 0) {
            const divida = Math.abs(pietroSaldo);
            statusLabel.innerText = `Pietro deve ${formatCurrency(divida)} para Patrick`;
            statusLabel.style.color = "var(--danger)";
            actionContainer.innerHTML = `<button class="btn btn-success" onclick="window.registrarAcerto('Pietro', 'Patrick', ${divida})"><i class="fa-solid fa-hand-holding-dollar"></i> Confirmar Acerto de Pietro</button>`;
        } else {
            const divida = Math.abs(patrickSaldo);
            statusLabel.innerText = `Patrick deve ${formatCurrency(divida)} para Pietro`;
            statusLabel.style.color = "var(--danger)";
            actionContainer.innerHTML = `<button class="btn btn-success" onclick="window.registrarAcerto('Patrick', 'Pietro', ${divida})"><i class="fa-solid fa-hand-holding-dollar"></i> Confirmar Acerto de Patrick</button>`;
        }

        window.renderCategoryUI();
        window.renderTable(transacoesDoMes);
        window.updateChart(chartData);
    };

    window.renderTable = (lista) => {
        const tbody = document.getElementById('expense-list');
        tbody.innerHTML = '';

        lista.forEach(t => {
            const tr = document.createElement('tr');
            const dataFormatada = t.data.split('-').reverse().join('/');

            if (t.type === 'expense') {
                let colAcoes = '';
                let statusBadge = '';

                if (t.status === 'pendente') {
                    statusBadge = `<span class="badge pendente">Pendente</span>`;
                    colAcoes = `
                        <div class="row-actions">
                            <button class="btn btn-sec" style="padding: 0.2rem 0.5rem; font-size: 0.75rem; background: var(--pietro); color:#FFF;" onclick="window.definirPagador('${t.id}', 'Pietro')">Pietro</button>
                            <button class="btn btn-sec" style="padding: 0.2rem 0.5rem; font-size: 0.75rem; background: var(--patrick); color:#FFF;" onclick="window.definirPagador('${t.id}', 'Patrick')">Patrick</button>
                            <button class="btn-icon edit" onclick="window.carregarEdicao('${t.id}')"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button class="btn-icon delete" onclick="window.removerTransacao('${t.id}')"><i class="fa-solid fa-trash-can"></i></button>
                        </div>`;
                } else {
                    statusBadge = `<span class="badge pago-${t.pagador.toLowerCase()}">Pago por ${t.pagador}</span>`;
                    colAcoes = `
                        <div class="row-actions" style="justify-content: flex-end; width: 100%;">
                            <button class="btn-icon edit" onclick="window.carregarEdicao('${t.id}')"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button class="btn-icon delete" onclick="window.removerTransacao('${t.id}')"><i class="fa-solid fa-trash-can"></i></button>
                        </div>`;
                }

                tr.innerHTML = `
                    <td>${dataFormatada}</td>
                    <td><strong>${t.descricao}</strong><br><small style="color: var(--text-muted)">${t.categoria}</small></td>
                    <td style="font-weight: 700;">${formatCurrency(t.valor)}</td>
                    <td>${statusBadge}</td>
                    <td style="text-align: right;">${colAcoes}</td>
                `;
            } else if (t.type === 'transfer') {
                tr.innerHTML = `
                    <td>${dataFormatada}</td>
                    <td><strong>Acerto Mútuo</strong><br><small style="color: var(--text-muted)">De ${t.origem} para ${t.destino}</small></td>
                    <td style="font-weight: 700; color: var(--success);">${formatCurrency(t.valor)}</td>
                    <td><span class="badge transfer"><i class="fa-solid fa-check-double"></i> Transferência</span></td>
                    <td style="text-align: right;">
                        <button class="btn-icon delete" onclick="window.removerTransacao('${t.id}')"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                `;
            }
            tbody.appendChild(tr);
        });
    };

    // Operações no Banco de Dados (Adicionar/Editar)
    document.getElementById('expense-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        document.getElementById('loading-overlay').style.display = 'flex';

        const id = document.getElementById('edit-id').value;
        const dataInput = document.getElementById('data-gasto').value;
        
        const dados = {
            descricao: document.getElementById('descricao').value,
            valor: parseFloat(document.getElementById('valor').value),
            categoria: document.getElementById('categoria').value,
            data: dataInput
        };

        try {
            if (id) {
                // Modo Edição no Firebase
                await updateDoc(doc(db, "transacoes", id), dados);
                window.clearForm();
            } else {
                // Novo Cadastro no Firebase
                await addDoc(collection(db, "transacoes"), {
                    type: 'expense',
                    status: 'pendente',
                    pagador: null,
                    ...dados
                });
                document.getElementById('descricao').value = '';
                document.getElementById('valor').value = '';
            }
            document.getElementById('filtro-mes').value = dataInput.substring(0, 7);
        } catch (error) {
            console.error("Erro ao salvar:", error);
            alert("Erro ao conectar com o banco de dados.");
        }
    });

    window.definirPagador = async (id, pagador) => {
        document.getElementById('loading-overlay').style.display = 'flex';
        await updateDoc(doc(db, "transacoes", id), { status: 'pago', pagador: pagador });
    };

    window.registrarAcerto = async (origem, destino, valor) => {
        document.getElementById('loading-overlay').style.display = 'flex';
        const mesAtual = document.getElementById('filtro-mes').value;
        await addDoc(collection(db, "transacoes"), {
            type: 'transfer',
            origem: origem,
            destino: destino,
            valor: parseFloat(valor),
            data: `${mesAtual}-01`
        });
    };

    window.removerTransacao = async (id) => {
        if(confirm("Tem certeza que deseja apagar este registro?")) {
            document.getElementById('loading-overlay').style.display = 'flex';
            await deleteDoc(doc(db, "transacoes", id));
        }
    };

    window.carregarEdicao = (id) => {
        const t = transactions.find(item => item.id === id);
        if (!t) return;
        document.getElementById('edit-id').value = t.id;
        document.getElementById('descricao').value = t.descricao;
        document.getElementById('valor').value = t.valor;
        document.getElementById('categoria').value = t.categoria;
        document.getElementById('data-gasto').value = t.data;
        document.getElementById('form-title').innerHTML = `<i class="fa-solid fa-pen-to-square"></i> Editar Registro`;
        document.getElementById('btn-submit').innerText = "Salvar Alterações";
        document.getElementById('btn-cancel-edit').style.display = "block";
    };

    window.clearForm = () => {
        document.getElementById('edit-id').value = '';
        document.getElementById('descricao').value = '';
        document.getElementById('valor').value = '';
        document.getElementById('data-gasto').value = new Date().toISOString().substring(0, 10);
        document.getElementById('form-title').innerHTML = `<i class="fa-solid fa-circle-plus"></i> Lançar Despesa`;
        document.getElementById('btn-submit').innerText = "Registrar Despesa";
        document.getElementById('btn-cancel-edit').style.display = "none";
    };

    window.updateChart = (chartData) => {
        const ctx = document.getElementById('categoryChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        const labels = Object.keys(chartData);
        const data = Object.values(chartData);

        if (data.length === 0) { labels.push('Sem gastos pagos'); data.push(1); }

        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: ['#4F46E5', '#8B5CF6', '#10B981', '#F59E0B', '#F43F5E', '#9CA3AF'],
                    borderWidth: 2,
                    borderColor: '#FFF'
                }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } } }
        });
    };

    window.exportToCSV = () => {
        const mesSel = document.getElementById('filtro-mes').value;
        const dadosFiltrados = transactions.filter(t => t.data.substring(0, 7) === mesSel);

        if (dadosFiltrados.length === 0) { alert('Não há dados cadastrados neste mês para exportar.'); return; }

        let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
        csvContent += "Data;Tipo;Descricao;Categoria;Valor;Status;Origem_Pagador;Destino_Acerto\r\n";

        dadosFiltrados.forEach(t => {
            if (t.type === 'expense') {
                csvContent += `${t.data};Despesa;${t.descricao};${t.categoria};${t.valor};${t.status};${t.pagador || ''};\r\n`;
            } else {
                csvContent += `${t.data};Acerto;;;${t.valor};Transferencia;${t.origem};${t.destino}\r\n`;
            }
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `gastos_casa_${mesSel}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    // Service Worker para PWA Offline-ready
    if ('serviceWorker' in navigator) {
        const swCode = `self.addEventListener('install', e => self.skipWaiting()); self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response("Offline"))));`;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
    }
</script>
</body>
</html>
